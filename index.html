<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☀️ Glume Financiare — Bună Dimineața!</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sora', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fffdf7;
            overflow-x: hidden;
            position: relative;
        }

        /* Sun illustration */
        .sun {
            position: fixed;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffe066 0%, #ffb347 40%, #ff8c4220 70%, transparent 100%);
            animation: sunRise 3s ease-out forwards, sunPulse 4s ease-in-out infinite 3s;
            z-index: 0;
        }

        @keyframes sunRise {
            from { bottom: -200px; opacity: 0.3; }
            to { bottom: -80px; opacity: 1; }
        }

        @keyframes sunPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.04); }
        }

        /* Sun rays */
        .sun-rays {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            background: radial-gradient(ellipse at bottom, #ffe06630 0%, #ffb34715 40%, transparent 70%);
            z-index: 0;
            animation: raysGlow 5s ease-in-out infinite;
        }

        @keyframes raysGlow {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Floating coffee cups */
        .coffee {
            position: fixed;
            font-size: 2.2rem;
            opacity: 0.15;
            animation: coffeeFloat 12s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        .coffee-1 { top: 12%; left: 8%; animation-delay: 0s; }
        .coffee-2 { top: 25%; right: 10%; animation-delay: -3s; font-size: 1.8rem; }
        .coffee-3 { bottom: 30%; left: 5%; animation-delay: -6s; font-size: 1.5rem; }
        .coffee-4 { top: 60%; right: 6%; animation-delay: -2s; font-size: 2rem; }
        .coffee-5 { top: 8%; left: 45%; animation-delay: -4s; font-size: 1.4rem; }
        .coffee-6 { bottom: 15%; right: 30%; animation-delay: -7s; font-size: 1.6rem; }

        @keyframes coffeeFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-12px) rotate(3deg); }
            50% { transform: translateY(-6px) rotate(-2deg); }
            75% { transform: translateY(-15px) rotate(2deg); }
        }

        /* Warm floating dots */
        .dot {
            position: fixed;
            border-radius: 50%;
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
            animation: dotFloat 10s ease-in-out infinite;
        }

        .dot-1 { width: 180px; height: 180px; background: #ffe066; top: 5%; right: 15%; animation-delay: 0s; }
        .dot-2 { width: 120px; height: 120px; background: #ffb347; bottom: 20%; left: 10%; animation-delay: -4s; }
        .dot-3 { width: 90px; height: 90px; background: #ffd6a0; top: 40%; left: 20%; animation-delay: -2s; }

        @keyframes dotFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.08); }
        }

        /* Good morning banner */
        .greeting {
            position: fixed;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            font-weight: 600;
            color: #b8860b;
            background: rgba(255, 224, 102, 0.25);
            border: 1px solid rgba(255, 179, 71, 0.2);
            padding: 8px 20px;
            border-radius: 100px;
            z-index: 10;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: greetFade 1s ease forwards;
            opacity: 0;
        }

        @keyframes greetFade {
            from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 179, 71, 0.15);
            border-radius: 32px;
            padding: 48px 40px;
            text-align: center;
            box-shadow: 
                0 12px 48px rgba(255, 179, 71, 0.1),
                0 2px 8px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        /* Emoji icon */
        .icon {
            font-size: 56px;
            margin-bottom: 16px;
            display: inline-block;
            animation: bounce 2.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }

        /* Title — Apple liquify */
        h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(
                270deg,
                #ff8c42,
                #ffb347,
                #ffe066,
                #ff6b9d,
                #ffb347,
                #ff8c42,
                #ffe066,
                #ff6b9d
            );
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            animation: liquidGradient 8s ease infinite;
        }

        @keyframes liquidGradient {
            0% { background-position: 0% 50%; }
            20% { background-position: 40% 80%; }
            40% { background-position: 100% 50%; }
            60% { background-position: 60% 20%; }
            80% { background-position: 30% 70%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            color: #b8860b;
            font-size: 0.9rem;
            margin-bottom: 32px;
            opacity: 0.6;
        }

        /* Joke display */
        .joke-container {
            background: rgba(255, 224, 102, 0.08);
            border: 1px solid rgba(255, 179, 71, 0.12);
            border-radius: 20px;
            padding: 32px 24px;
            margin-bottom: 32px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .joke-text {
            color: #3d2c0a;
            font-size: 1.15rem;
            line-height: 1.7;
            font-weight: 400;
            opacity: 1;
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .joke-text.fade-out {
            opacity: 0;
            transform: translateY(-10px);
        }

        .joke-text.fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Button */
        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 36px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            color: white;
            background: linear-gradient(135deg, #ffb347, #ff8c42);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 24px rgba(255, 140, 66, 0.3);
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff8c42, #ff6b9d);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 32px rgba(255, 140, 66, 0.45);
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .btn-emoji {
            font-size: 1.3rem;
            position: relative;
            z-index: 1;
        }

        /* Counter */
        .counter {
            margin-top: 24px;
            color: rgba(184, 134, 11, 0.4);
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Confetti particles */
        .particle {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            animation: particleFall 1.5s ease-out forwards;
        }

        @keyframes particleFall {
            0% { 
                opacity: 1; 
                transform: translateY(0) rotate(0deg) scale(1); 
            }
            100% { 
                opacity: 0; 
                transform: translateY(80px) rotate(720deg) scale(0); 
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
                border-radius: 24px;
            }
            h1 { font-size: 1.5rem; }
            .joke-text { font-size: 1rem; }
            .btn { padding: 14px 28px; }
            .sun { width: 220px; height: 220px; }
            .greeting { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="greeting" id="greeting"></div>

    <div class="sun"></div>
    <div class="sun-rays"></div>

    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>

    <div class="coffee coffee-1">☕</div>
    <div class="coffee coffee-2">☕</div>
    <div class="coffee coffee-3">☕</div>
    <div class="coffee coffee-4">☕</div>
    <div class="coffee coffee-5">☕</div>
    <div class="coffee coffee-6">☕</div>

    <div class="card">
        <div class="icon">☀️</div>
        <h1>Glume Financiare</h1>
        <p class="subtitle">Începe ziua cu un zâmbet și o cafea ☕</p>

        <div class="joke-container">
            <p class="joke-text" id="jokeText">Apasă butonul pentru prima glumă! 🌞</p>
        </div>

        <button class="btn" id="jokeBtn" onclick="newJoke()">
            <span class="btn-emoji">🎲</span>
            <span>Dă-mi o glumă!</span>
        </button>

        <div class="counter" id="counter"></div>
    </div>

    <script>
        const glume = [
            "De ce nu joacă bancherii la poker? 🃏\nPentru că se tem de lichidare.",
            "Ce i-a spus un ATM celuilalt?\n'Mă simt golit pe dinăuntru.' 😢",
            "De ce a divorțat contabila?\nSoțul ei nu mai conta. 💔",
            "De ce și-a luat economistul umbrelă?\nDin cauza previziunilor. ☂️",
            "Ce face un bancher când nu poate dormi?\nNumără banii altora. 💤",
            "De ce a mers cardul la psiholog?\nAvea probleme cu limita. 💳",
            "Cum se cheamă un bancher optimist?\nUn risc ambulant. 🎰",
            "De ce râdea creditul la bancă?\nPentru că dobânda era o glumă. 📈",
            "Ce i-a spus portofelul proprietarului?\n'Ne vedem tot mai rar.' 👛",
            "De ce banca nu are niciodată frig?\nAre mereu fonduri înghețate. 🥶",
            "Ce face un bancher pe plajă?\nVerifică fluxul de numerar. 🏖️",
            "De ce a fugit calculatorul din bancă?\nNu mai suporta atâtea conturi. 💻",
            "Cum îți dai seama că un economist e mort?\nNu mai greșește previziunile. 📊",
            "Ce e un optimist?\nUn om care crede că poate trăi din dobânzi. 🌈",
        ];

        const greetings = [
            "☀️ Bună dimineața! Zi frumoasă, glume bune.",
            "🌤️ O zi minunată începe cu un zâmbet!",
            "☕ Cafeaua e gata, glumele te așteaptă!",
            "🌻 Hai să râdem puțin azi!",
            "✨ Fiecare zi e mai bună cu o glumă.",
        ];

        // Set greeting
        document.getElementById('greeting').textContent = 
            greetings[Math.floor(Math.random() * greetings.length)];

        let count = 0;
        let lastIndex = -1;

        function newJoke() {
            const jokeText = document.getElementById('jokeText');
            
            let index;
            do {
                index = Math.floor(Math.random() * glume.length);
            } while (index === lastIndex && glume.length > 1);
            lastIndex = index;

            jokeText.classList.add('fade-out');
            jokeText.classList.remove('fade-in');

            setTimeout(() => {
                jokeText.innerHTML = glume[index].replace('\n', '<br>');
                jokeText.classList.remove('fade-out');
                jokeText.classList.add('fade-in');
                count++;
                document.getElementById('counter').textContent = 
                    count === 1 ? '1 glumă generată' : `${count} glume generate`;
            }, 200);

            spawnParticles();
        }

        function spawnParticles() {
            const colors = ['#ffe066', '#ffb347', '#ff8c42', '#ff6b9d', '#ffd6a0'];
            const btn = document.getElementById('jokeBtn');
            const rect = btn.getBoundingClientRect();

            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * 60) + 'px';
                particle.style.top = (rect.top + (Math.random() - 0.5) * 20) + 'px';
                document.body.appendChild(particle);

                setTimeout(() => particle.remove(), 1500);
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                newJoke();
            }
        });
    </script>
</body>
</html>
