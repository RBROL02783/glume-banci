<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Glume Financiare</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sora', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f1a;
            overflow: hidden;
            position: relative;
            transition: background 0.5s ease;
        }

        body.light {
            background: #f0f0f8;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg at 50% 50%,
                #ff6b9d20,
                #c44dff20,
                #4d9fff20,
                #4dffcb20,
                #ffdd4d20,
                #ff6b9d20
            );
            animation: rotate 20s linear infinite;
            z-index: 0;
        }

        body.light::before {
            background: conic-gradient(
                from 0deg at 50% 50%,
                #ff6b9d30,
                #c44dff30,
                #4d9fff30,
                #4dffcb30,
                #ffdd4d30,
                #ff6b9d30
            );
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
            z-index: 0;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: #ff6b9d;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: #4d9fff;
            bottom: 10%;
            right: 10%;
            animation-delay: -3s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: #c44dff;
            top: 50%;
            right: 30%;
            animation-delay: -5s;
        }

        body.light .orb {
            opacity: 0.25;
            filter: blur(100px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 48px 40px;
            text-align: center;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, background 0.5s ease, border 0.5s ease, box-shadow 0.5s ease;
        }

        body.light .card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 
                0 8px 40px rgba(0, 0, 0, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .card:hover {
            transform: translateY(-2px);
        }

        /* Emoji icon */
        .icon {
            font-size: 56px;
            margin-bottom: 16px;
            display: inline-block;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Title */
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(
                270deg,
                #ff6b9d,
                #c44dff,
                #4d9fff,
                #4dffcb,
                #ffdd4d,
                #ff6b9d,
                #c44dff,
                #4d9fff
            );
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            animation: liquidGradient 6s ease infinite;
        }

        @keyframes liquidGradient {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 75%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 25%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            margin-bottom: 32px;
            transition: color 0.5s ease;
        }

        body.light .subtitle {
            color: rgba(0, 0, 0, 0.4);
        }

        /* Joke display */
        .joke-container {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 32px 24px;
            margin-bottom: 32px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light .joke-container {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        .joke-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.15rem;
            line-height: 1.6;
            font-weight: 400;
            opacity: 1;
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        body.light .joke-text {
            color: rgba(0, 0, 0, 0.8);
        }

        .joke-text.fade-out {
            opacity: 0;
            transform: translateY(-10px);
        }

        .joke-text.fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Button */
        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 36px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            color: white;
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 24px rgba(196, 77, 255, 0.3);
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #c44dff, #4d9fff);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 32px rgba(196, 77, 255, 0.5);
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .btn-emoji {
            font-size: 1.3rem;
            position: relative;
            z-index: 1;
        }

        /* Counter */
        .counter {
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.5s ease;
        }

        body.light .counter {
            color: rgba(0, 0, 0, 0.3);
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 10;
            width: 52px;
            height: 52px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
        }

        body.light .theme-toggle {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        /* Confetti particles */
        .particle {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            animation: particleFall 1.5s ease-out forwards;
        }

        @keyframes particleFall {
            0% { 
                opacity: 1; 
                transform: translateY(0) rotate(0deg) scale(1); 
            }
            100% { 
                opacity: 0; 
                transform: translateY(100px) rotate(720deg) scale(0); 
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
                border-radius: 24px;
            }
            h1 { font-size: 1.5rem; }
            .joke-text { font-size: 1rem; }
            .btn { padding: 14px 28px; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="card">
        <div class="icon">🏦</div>
        <h1>Glume Financiare</h1>
        <p class="subtitle">Râzi până pierzi dobânda</p>

        <div class="joke-container">
            <p class="joke-text" id="jokeText">Apasă butonul pentru prima glumă! 🎉</p>
        </div>

        <button class="btn" id="jokeBtn" onclick="newJoke()">
            <span class="btn-emoji">🎲</span>
            <span>Dă-mi o glumă!</span>
        </button>

        <div class="counter" id="counter"></div>
    </div>

    <script>
        const glume = [
            "De ce nu joacă bancherii la poker? 🃏\nPentru că se tem de lichidare.",
            "Ce i-a spus un ATM celuilalt?\n'Mă simt golit pe dinăuntru.' 😢",
            "De ce a divorțat contabila?\nSoțul ei nu mai conta. 💔",
            "De ce și-a luat economistul umbrelă?\nDin cauza previziunilor. ☂️",
            "Ce face un bancher când nu poate dormi?\nNumără banii altora. 💤",
            "De ce a mers cardul la psiholog?\nAvea probleme cu limita. 💳",
            "Cum se cheamă un bancher optimist?\nUn risc ambulant. 🎰",
            "De ce râdea creditul la bancă?\nPentru că dobânda era o glumă. 📈",
            "Ce i-a spus portofelul proprietarului?\n'Ne vedem tot mai rar.' 👛",
            "De ce banca nu are niciodată frig?\nAre mereu fonduri înghețate. 🥶",
            "Ce face un bancher pe plajă?\nVerifică fluxul de numerar. 🏖️",
            "De ce a fugit calculatorul din bancă?\nNu mai suporta atâtea conturi. 💻",
            "Cum îți dai seama că un economist e mort?\nNu mai greșește previziunile. 📊",
            "Ce e un optimist?\nUn om care crede că poate trăi din dobânzi. 🌈",
        ];

        let count = 0;
        let lastIndex = -1;

        function newJoke() {
            const jokeText = document.getElementById('jokeText');
            
            // Get random joke (avoid repeating the last one)
            let index;
            do {
                index = Math.floor(Math.random() * glume.length);
            } while (index === lastIndex && glume.length > 1);
            lastIndex = index;

            // Animate out
            jokeText.classList.add('fade-out');
            jokeText.classList.remove('fade-in');

            setTimeout(() => {
                jokeText.innerHTML = glume[index].replace('\n', '<br>');
                jokeText.classList.remove('fade-out');
                jokeText.classList.add('fade-in');
                count++;
                document.getElementById('counter').textContent = 
                    count === 1 ? '1 glumă generată' : `${count} glume generate`;
            }, 200);

            // Spawn particles
            spawnParticles();
        }

        function spawnParticles() {
            const colors = ['#ff6b9d', '#c44dff', '#4d9fff', '#4dffcb', '#ffdd4d'];
            const btn = document.getElementById('jokeBtn');
            const rect = btn.getBoundingClientRect();

            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * 60) + 'px';
                particle.style.top = (rect.top + (Math.random() - 0.5) * 20) + 'px';
                document.body.appendChild(particle);

                setTimeout(() => particle.remove(), 1500);
            }
        }

        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle('light');
            const btn = document.getElementById('themeToggle');
            const isLight = document.body.classList.contains('light');
            btn.textContent = isLight ? '🌙' : '☀️';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        // Load saved theme
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light');
            document.getElementById('themeToggle').textContent = '🌙';
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                newJoke();
            }
        });
    </script>
</body>
</html>
